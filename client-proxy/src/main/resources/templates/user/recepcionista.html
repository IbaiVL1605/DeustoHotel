<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas – Recepción Deusto Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --gold-dark: #8B7C3A;
            --dark: #0F0E0C;
            --dark-2: #1A1916;
            --dark-3: #252420;
            --cream: #F5F0E8;
            --cream-2: #EDE8DC;
            --text-muted: #8A8070;
            --accent: #7C5C2E;
            --error: #e05555;
            --success: #6ee7a2;
            --warning: #ffa500;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ── HEADER ── */
        .logo-header {
            position: fixed;
            top: 2rem;
            left: 4rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: .08em;
            color: var(--gold);
            text-decoration: none;
            transition: color .25s;
            z-index: 100;
        }

        .logo-header:hover {
            color: var(--gold-light);
        }

        .logo-header span {
            font-style: italic;
            color: var(--cream);
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: fixed;
            top: 2rem;
            right: 4rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            z-index: 100;
        }

        .user-role {
            font-size: .75rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: right;
        }

        .user-role-title {
            font-size: .95rem;
            color: var(--cream);
            display: block;
            margin-bottom: .3rem;
        }

        .logout-btn {
            padding: .6rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .7rem;
            font-weight: 500;
            letter-spacing: .15em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--text-muted);
            background: transparent;
            color: var(--text-muted);
            transition: all .25s;
        }

        .logout-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1200px;
            margin: 6rem auto 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--cream);
            margin-bottom: .5rem;
        }

        .page-subtitle {
            font-size: .75rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
            opacity: .6;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: .5rem;
        }

        .stat-label {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

/* ── SECTIONS ── */
        .section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid rgba(201, 168, 76, .2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title-badge {
            font-size: .65rem;
            padding: .3rem .6rem;
            background: rgba(201, 168, 76, .15);
            color: var(--gold-light);
            border-radius: 1px;
            font-weight: 500;
        }

        /* ── CARDS ── */
        .reservas-grid {
            display: grid;
            gap: 1.5rem;
        }

        .reserva-card {
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 2rem;
            transition: all .25s;
            position: relative;
            overflow: hidden;
        }

        .reserva-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--gold);
            opacity: 0;
            transition: opacity .25s;
        }

        .reserva-card:hover {
            border-color: var(--gold);
            background: var(--dark-3);
        }

        .reserva-card:hover::before {
            opacity: 1;
        }

        .reserva-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(201, 168, 76, .1);
        }

        .reserva-left {
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .reserva-id {
            font-size: .75rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
        }

        .reserva-client {
            font-size: .95rem;
            color: var(--cream);
            font-weight: 400;
        }

        .reserva-type-badge {
            font-size: .65rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .35rem .7rem;
            background: rgba(201, 168, 76, .1);
            color: var(--gold-light);
            width: fit-content;
        }

        .reserva-status {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .4rem .8rem;
            background: rgba(255, 165, 0, .15);
            color: var(--warning);
            border: 1px solid rgba(255, 165, 0, .3);
        }

        .reserva-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }

        .detail-label {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .detail-value {
            font-size: .95rem;
            color: var(--cream);
            font-weight: 400;
        }

        .detail-value.highlight {
            color: var(--gold-light);
            font-weight: 500;
        }

        /* ── ACTIONS ── */
        .reserva-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(201, 168, 76, .1);
        }

        .btn {
            padding: .8rem 1.2rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .75rem;
            font-weight: 500;
            letter-spacing: .15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .25s;
            border: 1px solid;
            background: transparent;
            flex: 1;
            text-align: center;
        }

        .btn-confirm {
            color: var(--success);
            border-color: var(--success);
        }

        .btn-confirm:hover {
            background: var(--success);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .btn-reject {
            color: var(--error);
            border-color: var(--error);
        }

        .btn-reject:hover {
            background: var(--error);
            color: var(--cream);
            transform: translateY(-2px);
        }

        .btn-details {
            color: var(--gold);
            border-color: var(--gold);
        }

        .btn-details:hover {
            background: rgba(201, 168, 76, .1);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(.98);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: .5;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: .95rem;
        }

        /* ── ALERTS ── */
        .alert {
            padding: 1rem 1.2rem;
            border-radius: 1px;
            font-size: .9rem;
            margin-bottom: 2rem;
            border-left: 3px solid;
        }

        .alert-error {
            background: rgba(224, 85, 85, .08);
            border-left-color: var(--error);
            color: var(--error);
        }

        .alert-success {
            background: rgba(110, 231, 162, .08);
            border-left-color: var(--success);
            color: var(--success);
        }

        .alert-info {
            background: rgba(201, 168, 76, .08);
            border-left-color: var(--gold);
            color: var(--gold);
        }

/* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .logo-header {
                left: 1.5rem;
                font-size: 1.2rem;
            }

            .top-bar {
                right: 1.5rem;
                gap: 1rem;
                flex-direction: column;
                align-items: flex-end;
            }

            .container {
                margin-top: 10rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .reserva-card {
                padding: 1.5rem;
            }

            .reserva-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .reserva-actions {
                flex-direction: column;
            }

            .reserva-header {
                flex-direction: column;
                gap: 1rem;
            }

            body {
                padding: 1rem;
            }

            .modal-content {
                padding: 1.5rem;
            }
        }
    </style>



</head>
<body>

<!-- LOGO HEADER -->
<a href="/menu" class="logo-header">Deusto <span>Hotel</span></a>

<!-- MAIN CONTAINER -->
<div class="container">
    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">Gestión de Reservas</h1>
        <p class="page-subtitle">Confirmar o rechazar reservas pendientes</p>
        <div class="divider"></div>
    </div>

    <!-- ALERTS -->
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- RESERVAS PENDIENTES -->
    <div class="section">
        <h2 class="section-title">
            Reservas Pendientes
            <span class="section-title-badge" th:text="${totalPending ?: 0}">0</span>
        </h2>

        <div th:if="${(roomBookings != null && roomBookings.size() > 0) || (courtBookings != null && courtBookings.size() > 0)}" class="reservas-grid">

            <!-- HABITACIONES PENDIENTES -->
            <div th:each="booking : ${roomBookings}"
                 th:if="${booking.estado.toString() == 'PENDIENTE'}"
                 class="reserva-card">

                <div class="reserva-header">
                    <div class="reserva-left">
                        <span class="reserva-id">Reserva #<span th:text="${booking.id}"></span></span>
                        <span class="reserva-client" th:text="${booking.clienteNombre}"></span>
                        <span class="reserva-type-badge">Habitación</span>
                    </div>
                    <span class="reserva-status">PENDIENTE</span>
                </div>

                <div class="reserva-details">
                    <div class="detail-item">
                        <span class="detail-label">Número de habitación</span>
                        <span class="detail-value highlight" th:text="${booking.habitacionNumero}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Check-in</span>
                        <span class="detail-value" th:text="${booking.checkIn}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Check-out</span>
                        <span class="detail-value" th:text="${booking.checkOut}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Precio total</span>
                        <span class="detail-value" th:text="${booking.precioTotal}"></span>
                    </div>
                </div>

                <div class="reserva-actions">
                    <form th:action="@{/recepcion/validar}"
                          method="post"
                          style="flex: 1;">
                        <input type="hidden"
                               name="idReserva"
                               th:value="${booking.id}" />
                        <button type="submit" class="btn btn-confirm" onclick="return confirm('¿Confirmar esta reserva?')">
                            Confirmar
                        </button>
                    </form>
                    <form th:action="@{/recepcion/rechazar/habitacion/{id}(id=${booking.id})}" method="post" style="flex: 1;">
                        <button type="submit" class="btn btn-reject" onclick="return confirm('¿Rechazar esta reserva? Esta acción no se puede deshacer.')">
                            Rechazar
                        </button>
                    </form>
                </div>
            </div>

            <!-- PISTAS PENDIENTES -->
            <div th:each="booking : ${courtBookings}"
                 th:if="${booking.estado.toString() == 'PENDIENTE'}"
                 class="reserva-card">

                <div class="reserva-header">
                    <div class="reserva-left">
                        <span class="reserva-id">Reserva #<span th:text="${booking.id}"></span></span>
                        <span class="reserva-client" th:text="${booking.clienteNombre}"></span>
                        <span class="reserva-type-badge">Pista</span>
                    </div>
                    <span class="reserva-status">PENDIENTE</span>
                </div>

                <div class="reserva-details">
                    <div class="detail-item">
                        <span class="detail-label">Pista</span>
                        <span class="detail-value highlight" th:text="${booking.pistaNombre}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Fecha</span>
                        <span class="detail-value" th:text="${booking.horaInicio}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hora Fin</span>
                        <span class="detail-value" th:text="${booking.horaFin}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hora Inicio</span>
                        <span class="detail-value" th:text="${booking.clienteNombre}"></span>
                    </div>
                </div>

                <div class="reserva-actions">
                    <form th:action="@{/recepcion/validar}" method="post" style="flex: 1;">
                        <button type="submit" class="btn btn-confirm" onclick="return confirm('¿Confirmar esta reserva?')">
                            Confirmar
                        </button>
                    </form>
                    <form th:action="@{/recepcion/rechazar/pista/{id}(id=${booking.id})}" method="post" style="flex: 1;">
                        <button type="submit" class="btn btn-reject" onclick="return confirm('¿Rechazar esta reserva? Esta acción no se puede deshacer.')">
                            Rechazar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${(roomBookings == null || roomBookings.isEmpty()) && (courtBookings == null || courtBookings.isEmpty())}" class="empty-state">
            <div class="empty-state-icon">✓</div>
            <p>No hay reservas pendientes</p>
        </div>
    </div>

</div>

</body>
</html>
