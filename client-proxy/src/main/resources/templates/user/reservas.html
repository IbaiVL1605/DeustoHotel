<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas – Deusto Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #0F0E0C;
            --dark-2: #1A1916;
            --dark-3: #252420;
            --cream: #F5F0E8;
            --cream-2: #EDE8DC;
            --text-muted: #8A8070;
            --accent: #7C5C2E;
            --error: #e05555;
            --success: #6ee7a2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ── HEADER ── */
        .logo-header {
            position: fixed;
            top: 2rem;
            left: 4rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: .08em;
            color: var(--gold);
            text-decoration: none;
            transition: color .25s;
            z-index: 100;
        }

        .logo-header:hover {
            color: var(--gold-light);
        }

        .logo-header span {
            font-style: italic;
            color: var(--cream);
        }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1000px;
            margin: 6rem auto 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--cream);
            margin-bottom: .5rem;
        }

        .page-subtitle {
            font-size: .75rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
            opacity: .6;
        }

        /* ── SECTIONS ── */
        .section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid rgba(201, 168, 76, .2);
        }

        /* ── CARDS ── */
        .reservas-grid {
            display: grid;
            gap: 1.5rem;
        }

        .reserva-card {
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 2rem;
            transition: border-color .25s;
        }

        .reserva-card:hover {
            border-color: var(--gold);
        }

        .reserva-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(201, 168, 76, .1);
        }

        .reserva-id {
            font-size: .75rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
        }

        .reserva-status {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .4rem .8rem;
            background: rgba(201, 168, 76, .1);
            color: var(--gold-light);
        }

        .reserva-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }

        .detail-label {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .detail-value {
            font-size: .95rem;
            color: var(--cream);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: .95rem;
        }

        /* ── ALERT ── */
        .alert {
            padding: 1rem 1.2rem;
            border-radius: 2px;
            font-size: .9rem;
            margin-bottom: 2rem;
            background: rgba(224, 85, 85, .1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .logo-header {
                left: 1.5rem;
                font-size: 1.2rem;
            }

            .container {
                margin-top: 5rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .reserva-card {
                padding: 1.5rem;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- LOGO HEADER -->
<a href="/menu" class="logo-header">Deusto <span>Hotel</span></a>

<!-- MAIN CONTAINER -->
<div class="container">
    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">Mis Reservas</h1>
        <p class="page-subtitle">Gestiona tus reservas</p>
        <div class="divider"></div>
    </div>

    <!-- ERROR ALERT -->
    <div th:if="${error}" class="alert">
        <span th:text="${error}"></span>
    </div>

    <!-- RESERVAS DE HABITACIONES -->
    <div class="section">
        <h2 class="section-title">Reservas de Habitaciones</h2>

        <div th:if="${roomBookings != null and !roomBookings.isEmpty()}" class="reservas-grid">
            <div th:each="booking : ${roomBookings}" class="reserva-card">
                <div class="reserva-header">
                    <span class="reserva-id">Reserva #<span th:text="${booking.id}"></span></span>
                    <span class="reserva-status" th:text="${booking.estado}"></span>
                </div>
                <div class="reserva-details">
                    <div class="detail-item">
                        <span class="detail-label">Habitación</span>
                        <span class="detail-value" th:text="${booking.habitacionNumero}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Check-in</span>
                        <span class="detail-value" th:text="${booking.checkIn}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Check-out</span>
                        <span class="detail-value" th:text="${booking.checkOut}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Precio Total</span>
                        <span class="detail-value" th:text="${booking.precioTotal} + '€'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${roomBookings == null or roomBookings.isEmpty()}" class="empty-state">
            <p>No tienes reservas de habitaciones</p>
        </div>
    </div>

    <!-- RESERVAS DE PISTAS -->
    <div class="section">
        <h2 class="section-title">Reservas de Pistas</h2>

        <div th:if="${courtBookings != null and !courtBookings.isEmpty()}" class="reservas-grid">
            <div th:each="booking : ${courtBookings}" class="reserva-card">
                <div class="reserva-header">
                    <span class="reserva-id">Reserva #<span th:text="${booking.id}"></span></span>
                    <span class="reserva-status" th:text="${booking.estado}"></span>
                </div>
                <div class="reserva-details">
                    <div class="detail-item">
                        <span class="detail-label">Pista</span>
                        <span class="detail-value" th:text="${booking.pistaNombre}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Fecha</span>
                        <span class="detail-value" th:text="${booking.fecha}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hora</span>
                        <span class="detail-value" th:text="${booking.horaInicio} + ' - ' + ${booking.horaFin}"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Precio</span>
                        <span class="detail-value" th:text="${booking.precioTotal} + '€'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${courtBookings == null or courtBookings.isEmpty()}" class="empty-state">
            <p>No tienes reservas de pistas</p>
        </div>
    </div>
</div>

</body>
</html>
