<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Deusto Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Usa el mismo estilo que tu HTML anterior */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #0F0E0C;
            --dark-2: #1A1916;
            --dark-3: #252420;
            --cream: #F5F0E8;
            --text-muted: #8A8070;
            --accent: #7C5C2E;
            --error: #e05555;
            --success: #6ee7a2;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background: var(--dark); color: var(--cream); font-family:'DM Sans', sans-serif; min-height:100vh; padding:2rem; }
        .logo-header { position:absolute; top:2rem; left:4rem; font-family:'Playfair Display', serif; font-size:1.5rem; color:var(--gold); text-decoration:none; }
        .logo-header span { font-style:italic; color:var(--cream); }
        .auth-container { width:100%; max-width:600px; margin:auto; }
        .auth-card { background:var(--dark-2); border:1px solid rgba(201,168,76,.2); padding:3rem 2.5rem; backdrop-filter: blur(10px); margin-bottom:2rem; }
        .auth-header { text-align:center; margin-bottom:2.5rem; }
        .auth-title { font-family:'Playfair Display', serif; font-size:2rem; color:var(--cream); margin-bottom:.5rem; }
        .auth-subtitle { font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; color:var(--text-muted); }
        .divider { width:40px; height:1px; background:var(--gold); margin:1.5rem auto; opacity:.6; }
        .auth-form { display:flex; flex-direction:column; gap:1.5rem; }
        .form-group { display:flex; flex-direction:column; gap:.6rem; }
        .form-group label { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); font-weight:500; }
        .form-group input, .form-group select { background:var(--dark-3); border:1px solid rgba(201,168,76,.2); color:var(--cream); padding:1rem 1.2rem; font-size:.95rem; font-weight:300; outline:none; transition:border-color .25s, box-shadow .25s; width:100%; }
        .form-group input:focus, .form-group select:focus { border-color: var(--gold); box-shadow:0 0 0 2px rgba(201,168,76,.1); }
        .submit-btn { background:var(--gold); color:var(--dark); border:none; padding:1.1rem 1.5rem; font-weight:500; letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:background .25s, transform .1s; margin-top:1rem; width:100%; }
        .submit-btn:hover:not(:disabled) { background:var(--gold-light); }
        .submit-btn:active:not(:disabled) { transform:scale(.98); }
        .alert { padding:1rem 1.2rem; border-radius:2px; font-size:.9rem; line-height:1.4; margin-bottom:1.5rem; display:none; animation:slideDown .3s ease-out; }
        .alert.show { display:flex; align-items:center; gap:.75rem; }
        .alert-error { background: rgba(224,85,85,.1); border:1px solid var(--error); color:var(--error); }
        .alert-success { background: rgba(110,231,162,.1); border:1px solid var(--success); color:var(--success); }
        .alert-icon { font-size:1.1rem; flex-shrink:0; }
        @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<a href="/" class="logo-header">Deusto <span>Hotel</span></a>

<div class="auth-container">

    <!-- ── HABITACIONES ── -->
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Habitaciones</h1>
            <p class="auth-subtitle">Crear nueva habitación</p>
            <div class="divider"></div>
        </div>

        <!-- ALERTAS -->
        <div class="alert alert-error" th:classappend="${error != null} ? ' show' : ''">
            <span class="alert-icon">⚠</span>
            <span th:text="${error}"></span>
        </div>
        <div class="alert alert-success" th:classappend="${success != null} ? ' show' : ''">
            <span class="alert-icon">✓</span>
            <span th:text="${success}">¡Habitación creada correctamente!</span>
        </div>

        <!-- FORM -->
        <form class="auth-form" th:action="@{/admin/rooms}" method="post">
            <div class="form-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" placeholder="101" required>
            </div>
            <div class="form-group">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo">
                    <option value="INDIVIDUAL">INDIVIDUAL</option>
                    <option value="DOBLE">DOBLE</option>
                    <option value="SUITE">SUITE</option>
                </select>
            </div>
            <div class="form-group">
                <label for="capacidad">Capacidad</label>
                <input type="number" id="capacidad" name="capacidad" placeholder="2" required>
            </div>
            <div class="form-group">
                <label for="precio">Precio por noche</label>
                <input type="number" step="0.01" id="precio" name="precioPorNoche" placeholder="75.00" required>
            </div>
            <button type="submit" class="submit-btn">Crear habitación</button>
        </form>
    </div>

    <!-- ── PISTAS ── -->
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Pistas</h1>
            <p class="auth-subtitle">Crear nueva pista</p>
            <div class="divider"></div>
        </div>

        <!-- ALERTAS -->
        <div class="alert alert-error" th:classappend="${pistaError != null} ? ' show' : ''">
            <span class="alert-icon">⚠</span>
            <span th:text="${pistaError}"></span>
        </div>
        <div class="alert alert-success" th:classappend="${pistaSuccess != null} ? ' show' : ''">
            <span class="alert-icon">✓</span>
            <span th:text="${pistaSuccess}">¡Pista creada correctamente!</span>
        </div>

        <!-- FORM -->
        <form class="auth-form" th:action="@{/admin/courts}" method="post">
            <div class="form-group">
                <label for="nombrePista">Nombre</label>
                <input type="text" id="nombrePista" name="nombre" placeholder="Pista 1" required>
            </div>
            <div class="form-group">
                <label for="tipoPista">Tipo</label>
                <select id="tipoPista" name="tipo">
                    <option value="TENIS">TENIS</option>
                    <option value="PADEL">PADEL</option>
                    <option value="FUTBOL">FUTBOL</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Crear pista</button>
        </form>
    </div>

</div>

</body>
</html>
