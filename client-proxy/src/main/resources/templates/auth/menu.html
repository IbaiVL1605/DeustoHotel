<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú – Deusto Hotel</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold:#C9A84C;
            --dark:#0F0E0C;
            --dark2:#1A1916;
            --cream:#F5F0E8;
        }

        body {
            background: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* CARD */
        .menu-card {
            background: var(--dark2);
            padding: 3rem;
            border: 1px solid rgba(201,168,76,.2);
            width: 400px;
            text-align: center;
        }

        /* TITLE */
        h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 2rem;
        }

        /* BUTTONS */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            text-decoration: none;
            transition: .3s;
        }

        .menu-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }
    </style>
</head>

<body>

<div class="menu-card">

    <h1>Menú principal</h1>

    <a href="/habitaciones/disponibles" class="menu-btn">
        Habitaciones
    </a>

    <a href="/pistas" class="menu-btn">
        Pistas deportivas
    </a>

    <a href="/reservas" class="menu-btn">
        Mis reservas
    </a>

    <!-- SOLO ADMIN -->
    <div th:if="${role == 'ADMIN'}">
        <a href="/admin" class="menu-btn">
            Panel Admin
        </a>
    </div>

</div>

</body>
</html>
