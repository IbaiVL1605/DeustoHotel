<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Habitación – Deusto Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #0F0E0C;
            --dark-2: #1A1916;
            --dark-3: #252420;
            --cream: #F5F0E8;
            --cream-2: #EDE8DC;
            --text-muted: #8A8070;
            --accent: #7C5C2E;
            --error: #e05555;
            --success: #6ee7a2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ── HEADER ── */
        .logo-header {
            position: absolute;
            top: 2rem;
            left: 4rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: .08em;
            color: var(--gold);
            text-decoration: none;
            transition: color .25s;
        }

        .logo-header:hover {
            color: var(--gold-light);
        }

        .logo-header span {
            font-style: italic;
            color: var(--cream);
        }

        /* ── MAIN CONTAINER ── */
        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* ── CARD ── */
        .auth-card {
            background: var(--dark-2);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 3rem 2.5rem;
            backdrop-filter: blur(10px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--cream);
            margin-bottom: .5rem;
        }

        .auth-subtitle {
            font-size: .75rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
            opacity: .6;
        }

        /* ── FORM ── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }

        .form-group label {
            font-size: .7rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            background: var(--dark-3);
            border: 1px solid rgba(201, 168, 76, .2);
            color: var(--cream);
            padding: 1rem 1.2rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            font-weight: 300;
            outline: none;
            transition: border-color .25s, box-shadow .25s;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: .6;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(201, 168, 76, .1);
        }

        .form-group select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23C9A84C' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            padding-right: 3rem;
        }

        /* ── SUBMIT BUTTON ── */
        .submit-btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 1.1rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem;
            font-weight: 500;
            letter-spacing: .15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .25s, transform .1s;
            margin-top: 1rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--gold-light);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(.98);
        }

        .submit-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .logo-header {
                left: 1.5rem;
                font-size: 1.2rem;
            }

            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-title {
                font-size: 1.6rem;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- LOGO HEADER -->
<a href="/" class="logo-header">Deusto <span>Hotel</span></a>

<!-- AUTH CONTAINER -->
<div class="auth-container">
    <div class="auth-card">
        <!-- HEADER -->
        <div class="auth-header">
            <h1 class="auth-title">Nueva Habitación</h1>
            <p class="auth-subtitle">Crear habitación del hotel</p>
            <div class="divider"></div>
        </div>

        <!-- FORM -->
        <form th:action="@{/admin}" method="post" id="roomForm" class="auth-form">
            <div class="form-group">
                <label for="numero">Número</label>
                <input type="text" name="numero" id="numero" placeholder="Número" required />
            </div>

            <div class="form-group">
                <label for="tipo">Tipo</label>
                <select name="tipo" id="tipo" required>
                    <option value="INDIVIDUAL">INDIVIDUAL</option>
                    <option value="DOBLE">DOBLE</option>
                    <option value="SUITE">SUITE</option>
                </select>
            </div>

            <div class="form-group">
                <label for="capacidad">Capacidad</label>
                <input type="number" name="capacidad" id="capacidad" placeholder="Capacidad" required />
            </div>

            <div class="form-group">
                <label for="precioPorNoche">Precio por noche</label>
                <input type="number" name="precioPorNoche" id="precioPorNoche" placeholder="Precio por noche" required />
            </div>

            <button type="submit" class="submit-btn">Crear Habitación</button>
        </form>
    </div>
</div>

<script>
    const tipoSelect = document.getElementById('tipo');
    const capacidadInput = document.getElementById('capacidad');
    const precioInput = document.getElementById('precioPorNoche');

    function actualizarCampos() {
        const tipo = tipoSelect.value;

        if (tipo === 'INDIVIDUAL') {
            capacidadInput.value = 1;
            precioInput.value = 50;
        }

        if (tipo === 'DOBLE') {
            capacidadInput.value = 2;
            precioInput.value = 80;
        }

        if (tipo === 'SUITE') {
            capacidadInput.value = '';
            precioInput.value = '';
        }
    }

    tipoSelect.addEventListener('change', actualizarCampos);
    window.addEventListener('load', actualizarCampos);
</script>

</body>
</html>
