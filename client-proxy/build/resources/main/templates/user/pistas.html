<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad de Pistas – Deusto Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #0F0E0C;
            --dark-2: #1A1916;
            --dark-3: #252420;
            --cream: #F5F0E8;
            --cream-2: #EDE8DC;
            --text-muted: #8A8070;
            --accent: #7C5C2E;
            
            /* Pistas specific overrides for calendar */
            --avail-color: #C9A84C;
            --avail-bg: rgba(201,168,76,.1);
            --full-color: #8A8070;
            --full-bg: rgba(255,255,255,.02);
            --past-bg: rgba(0,0,0,.2);
            --today-bg: rgba(201,168,76,.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header.main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            border-bottom: 1px solid rgba(201,168,76,.2);
            position: sticky;
            top: 0;
            background: var(--dark);
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: .08em;
            color: var(--gold);
        }

        .logo span { font-style: italic; color: var(--cream); }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 5rem 2rem 3rem;
        }

        .hero-label {
            font-size: .7rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--cream);
        }

        .hero h1 em { font-style: italic; color: var(--gold-light); }

        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 2rem auto;
            opacity: .6;
        }

        /* ── MAIN / CALENDAR ── */
        main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 4rem 6rem;
            width: 100%;
        }

        .calendar-container {
            background: var(--dark-2);
            border: 1px solid rgba(201,168,76,.15);
            padding: 2rem;
            margin-bottom: 3rem;
            border-radius: 4px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .calendar-title-wrap h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--cream);
            margin-bottom: 0.4rem;
        }

        .calendar-title-wrap p {
            font-size: .8rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        form {
            display: flex;
            align-items: center;
            margin: 0;
        }

        select {
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(201,168,76,.2);
            background-color: var(--dark-3);
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            color: var(--cream);
            outline: none;
            cursor: pointer;
            transition: border-color 0.25s;
        }
        
        select:focus {
            border-color: var(--gold);
        }

        .nav-btn {
            background-color: transparent;
            border: 1px solid rgba(201,168,76,.2);
            color: var(--cream);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: .8rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            transition: all 0.25s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,168,76,.05);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: rgba(201,168,76,.1);
        }

        .calendar-grid {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid rgba(201,168,76,.1);
        }

        th {
            padding: 1.5rem 0;
            text-align: center;
            font-weight: normal;
        }

        .day-name {
            display: block;
            font-size: .65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .2em;
            margin-bottom: 0.5rem;
        }

        .day-date {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--cream);
        }

        td {
            height: 70px;
            position: relative;
            padding: 6px;
            vertical-align: top;
        }

        .time-col {
            width: 70px;
            font-size: .75rem;
            color: var(--text-muted);
            text-align: right;
            padding-right: 0.8rem;
            border-top: none;
            border-bottom: none;
            border-left: none;
            position: relative;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .time-col span {
            position: absolute;
            top: -0.6em;
            right: 0.8rem;
        }

        .past-day {
            background-color: var(--past-bg);
        }

        .today-col {
            background-color: var(--today-bg);
            border-bottom: 2px solid var(--gold);
        }

        .today-col .day-date {
            color: var(--gold-light);
        }

        .event-box {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: .75rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
        }
        
        .event-box:hover {
            transform: translateY(-2px);
        }

        .available {
            background-color: var(--avail-bg);
            color: var(--avail-color);
            border: 1px solid rgba(201,168,76,.2);
        }
        
        .available:hover {
            background-color: rgba(201,168,76,.2);
            border-color: var(--gold);
        }

        .full {
            background-color: var(--full-bg);
            color: var(--full-color);
            border: 1px solid rgba(255,255,255,.05);
            cursor: not-allowed;
            transform: none !important;
        }
        
        .past-event {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed rgba(255,255,255,.05);
            cursor: default;
            transform: none !important;
            font-size: .7rem;
        }

        .week-container {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        
        .week-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
            border: 1px dashed rgba(201,168,76,.2);
        }

        @media (max-width: 768px) {
            header.main-header, main { padding-left: 1.5rem; padding-right: 1.5rem; }
            .calendar-container { padding: 1.5rem; }
            td { height: 50px; }
            .event-box { font-size: 0.65rem; }
            .time-col { width: 50px; }
            .calendar-header { flex-direction: column; align-items: flex-start; }
            .controls { justify-content: flex-start; }
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: var(--dark-2);
            margin: 10% auto;
            padding: 2rem;
            border: 1px solid var(--gold);
            width: 400px;
            color: var(--cream);
            border-radius: 6px;
        }

        .modal-content h2 {
            margin-bottom: 1rem;
        }

        .modal-content input {
            width: 100%;
            margin: 0.5rem 0 1rem;
            padding: 0.5rem;
            background: var(--dark-3);
            border: 1px solid var(--gold);
            color: var(--cream);
        }

        .modal-content button {
            width: 100%;
            padding: 0.7rem;
            background: var(--gold);
            border: none;
            cursor: pointer;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<!-- ── HEADER ── -->
<header class="main-header">
    <div class="logo">Deusto <span>Hotel</span></div>
</header>

<!-- ── HERO ── -->
<div class="hero">
    <p class="hero-label">Instalaciones Deportivas</p>
    <h1>Reserva tu <em>pista</em><br>favorita</h1>
    <div class="divider"></div>
</div>

<main>
    <div class="calendar-container">
        <div class="calendar-header">
            <div class="calendar-title-wrap">
                <h2>Disponibilidad</h2>
                <p>Semana vista <span id="week-indicator"></span></p>
            </div>
            
            <div class="controls">
                <button class="nav-btn" id="prev-week-btn" onclick="changeWeek(-1)">Anterior</button>
                <button class="nav-btn" id="next-week-btn" onclick="changeWeek(1)">Siguiente</button>
                
                <form method="get" action="/pistas" id="filter-form">
                    <input type="hidden" name="year" th:value="${year}">
                    <input type="hidden" name="month" th:value="${month}">
                    <select name="tipo" onchange="document.getElementById('filter-form').submit()">
                        <option value="" th:selected="${tipo == null}">Todas las pistas</option>
                        <option value="TENIS" th:selected="${tipo == 'TENIS'}">Tenis</option>
                        <option value="PADEL" th:selected="${tipo == 'PADEL'}">Pádel</option>
                        <option value="FUTBOL" th:selected="${tipo == 'FUTBOL'}">Fútbol</option>
                        <option value="PISCINA" th:selected="${tipo == 'PISCINA'}">Piscina</option>
                    </select>
                </form>
                
                <form method="get" action="/pistas">
                    <input type="hidden" name="year" th:value="${month == 1 ? year - 1 : year}">
                    <input type="hidden" name="month" th:value="${month == 1 ? 12 : month - 1}">
                    <input type="hidden" name="tipo" th:value="${tipo}">
                    <button type="submit" class="nav-btn">Mes Anterior</button>
                </form>
                <form method="get" action="/pistas">
                    <input type="hidden" name="year" th:value="${month == 12 ? year + 1 : year}">
                    <input type="hidden" name="month" th:value="${month == 12 ? 1 : month + 1}">
                    <input type="hidden" name="tipo" th:value="${tipo}">
                    <button type="submit" class="nav-btn">Mes Siguiente</button>
                </form>
            </div>
        </div>

        <div th:if="${disponibilidad != null}">
            <div th:each="week, weekStat : ${disponibilidad}" 
                 class="week-container" 
                 th:id="'week-' + ${weekStat.index}">

                <table class="calendar-grid">
                    <thead>
                        <tr>
                            <th class="time-col"></th>
                            <th th:each="dia : ${week.days}" 
                                th:classappend="${dia.fecha.equals(hoy)} ? 'today-col' : (${dia.fecha.isBefore(hoy)} ? 'past-day' : '')">
                                <span class="day-name" th:text="${#temporals.format(dia.fecha, 'EEE')}">Día</span>
                                <span class="day-date" th:text="${#temporals.format(dia.fecha, 'd')}">Fecha</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="hora : ${#numbers.sequence(8, 21)}">
                            <td class="time-col">
                                <span th:text="${hora + ':00'}">8:00</span>
                            </td>
                            
                            <td th:each="dia : ${week.days}" 
                                th:classappend="${dia.fecha.equals(hoy)} ? 'today-col' : (${dia.fecha.isBefore(hoy)} ? 'past-day' : '')">
                                
                                <div th:if="${dia.fecha.isBefore(hoy) || (dia.fecha.equals(hoy) && hora < T(java.time.LocalTime).now().getHour())}" 
                                     class="event-box past-event">
                                    <span>-</span>
                                </div>
                                
                                <div th:if="${!dia.fecha.isBefore(hoy) && (!dia.fecha.equals(hoy) || hora >= T(java.time.LocalTime).now().getHour())}">
                                    <div th:with="slotIndex=${hora - 8}">
                                        <div th:if="${dia.slots != null and dia.slots.size() > slotIndex}" th:with="slot=${dia.slots[slotIndex]}">
                                            <div th:if="${slot.availableCourts.size() > 0}"
                                                 class="event-box available"
                                                 th:attr="onclick=|openModal('${dia.fecha}', '${hora}', '${objectMapper.writeValueAsString(slot.availableCourts)}')|">
                                                <span th:text="${slot.availableCourts.size()} + ' disp'"></span>
                                            </div>
                                            <div th:if="${slot.availableCourts.size() == 0}" class="event-box full">
                                                <span>Ocupado</span>
                                            </div>
                                        </div>
                                        <div th:if="${dia.slots == null or dia.slots.size() <= slotIndex}" class="event-box past-event">
                                            <span>N/A</span>
                                        </div>
                                    </div>
                                </div>
                                
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div th:if="${disponibilidad == null || disponibilidad.size() == 0}" class="no-data">
            No hay datos de disponibilidad para este mes.
        </div>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const weeks = document.querySelectorAll('.week-container');
        if (weeks.length === 0) return;
        
        let currentWeekIndex = 0;
        
        for (let i = 0; i < weeks.length; i++) {
            if (weeks[i].querySelector('th.today-col')) {
                currentWeekIndex = i;
                break;
            }
        }
        
        updateWeekVisibility(currentWeekIndex);
        
        window.changeWeek = function(direction) {
            const newIndex = currentWeekIndex + direction;
            if (newIndex >= 0 && newIndex < weeks.length) {
                currentWeekIndex = newIndex;
                updateWeekVisibility(currentWeekIndex);
            }
        };
        
        function updateWeekVisibility(index) {
            weeks.forEach((w, i) => {
                if (i === index) {
                    w.classList.add('active');
                } else {
                    w.classList.remove('active');
                }
            });
            
            document.getElementById('prev-week-btn').disabled = (index === 0);
            document.getElementById('next-week-btn').disabled = (index === weeks.length - 1);
            document.getElementById('week-indicator').textContent = (index + 1) + " de " + weeks.length;
        }
    });
    function openModal(date, hour, courtsParam) {
        document.getElementById("booking-modal").style.display = "block";

        document.getElementById("modal-date").textContent = date;
        document.getElementById("modal-hour").textContent = hour + ":00";

        // Autocompletar horas
        document.getElementById("start-time").value = hour + ":00";
        const endHour = parseInt(hour) + 1;
        document.getElementById("end-time").value = endHour + ":00";

        const list = document.getElementById("available-courts");
        list.innerHTML = "";
        
        let courts = [];
        try {
            courts = typeof courtsParam === 'string' ? JSON.parse(courtsParam) : courtsParam;
        } catch (e) {
            console.error("Error parsing courts JSON", e);
        }

        if (courts && courts.length > 0) {
            courts.forEach(c => {
                const li = document.createElement("li");
                li.style.display = "flex";
                li.style.justifyContent = "space-between";
                li.style.alignItems = "center";
                li.style.marginBottom = "0.5rem";
                li.style.padding = "0.5rem";
                li.style.border = "1px solid rgba(201,168,76,.2)";
                li.style.borderRadius = "4px";

                const textSpan = document.createElement("span");
                textSpan.textContent = c.nombre + " (" + c.tipo + ") - " + c.precioPorHora + "€/h";

                const btn = document.createElement("button");
                btn.textContent = "Reservar";
                btn.style.width = "auto";
                btn.style.padding = "0.4rem 1rem";
                btn.style.margin = "0";
                btn.style.fontSize = "0.85rem";
                btn.onclick = function() {
                    makeReservation(c.id);
                };

                li.appendChild(textSpan);
                li.appendChild(btn);
                list.appendChild(li);
            });
        } else {
            const li = document.createElement("li");
            li.textContent = "No hay pistas disponibles";
            li.style.color = "var(--text-muted)";
            li.style.fontStyle = "italic";
            li.style.border = "none";
            li.style.padding = "0.5rem 0";
            list.appendChild(li);
        }
    }

    function closeModal() {
        document.getElementById("booking-modal").style.display = "none";
    }

    function makeReservation(pistaId) {
        const date = document.getElementById("modal-date").textContent;
        const start = document.getElementById("start-time").value;
        const end = document.getElementById("end-time").value;

        if (!pistaId) {
            alert("Id de pista no válido");
            return;
        }

        const request = {
            pistaId: pistaId,
            fecha: date,
            horaInicio: start,
            horaFin: end
        };

        fetch('/api/v1/court-bookings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(request)
        })
        .then(res => {
            if (!res.ok) throw new Error("Error al reservar");
            return res.json();
        })
        .then(data => {
            if (data.status === "ERROR") {
                alert("No se pudo reservar: " + data.message);
                return;
            }
            alert("Reserva realizada correctamente 🎾");
            closeModal();
            location.reload(); // refrescar disponibilidad
        })
        .catch(err => {
            console.error(err);
            alert("Ruta no encontrada o error interno (" + err.message + ")");
        });
    }
    // ── CONEXIÓN WEBSOCKET PARA ACTUALIZACIONES EN TIEMPO REAL ──
    (function() {
        // Conectar al endpoint WebSocket del servidor (puerto 8080)
        const socket = new SockJS('http://localhost:8080/ws');
        const stompClient = Stomp.over(socket);

        // Desactivar logs de debug de STOMP (opcional)
        stompClient.debug = null;

        stompClient.connect({}, function(frame) {
            console.log('✅ Conectado a WebSocket para actualizaciones en tiempo real');

            // Suscribirse al canal de actualizaciones de pistas
            stompClient.subscribe('/topic/court-updates', function(message) {
                const update = JSON.parse(message.body);
                console.log('📡 Actualización recibida:', update);

                // Recargar la página para mostrar la disponibilidad actualizada
                location.reload();
            });
        }, function(error) {
            console.error('❌ Error WebSocket:', error);
            // Fallback: si WebSocket falla, usar polling cada 15 segundos
            setInterval(function() {
                location.reload();
            }, 15000);
        });
    })();
</script>

<div id="booking-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <h2>Reservar pista</h2>

        <p><strong>Fecha:</strong> <span id="modal-date"></span></p>
        <p><strong>Hora seleccionada:</strong> <span id="modal-hour"></span></p>

        <input type="hidden" id="start-time">
        <input type="hidden" id="end-time">

        <label style="display:block; margin-top:1rem;">Pistas disponibles:</label>
        <ul id="available-courts" style="list-style: none; padding: 0;"></ul>
    </div>
</div>

</body>
</html>
